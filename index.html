<section id="pomodoro" class="tool-section">
      <h1>專注番茄鐘</h1>
      
      <div class="mode-tabs">
        <button class="mode-btn active" onclick="setMode(25, this)">番茄鐘</button>
        <button class="mode-btn" onclick="setMode(5, this)">短休息</button>
        <button class="mode-btn" onclick="setMode(10, this)">長休息</button>
      </div>

      <div class="display-screen">
        <h2 id="timeDisplay">25:00</h2>
      </div>

      <div class="btn-group">
        <button id="pomoActionBtn" class="action-btn" onclick="toggleTimer()">開始</button>
        <button class="danger-btn" onclick="resetTimer()">重置</button>
      </div>
    </section>
